target_type: repo
checks:
  hardcoded_keys: true
  unsafe_output_exec: true
  prompt_injection_flow: true
  missing_input_validation: true
  system_prompt_leak: true
  excessive_agency: true
  vulnerable_dependencies: true
  indirect_prompt_injection: true
live_checks:
  rate_limit_check: true
  cors_misconfig: true
  injection_payload_check:
    enabled: false
    min_confidence: 70
  pii_leak_check: false
  ssrf_tool_check: false
severity_threshold: medium
require_permission_ack: true

secret_detection:
  entropy_threshold: 70
  min_rules: 150

judge:
  enabled: false
  provider: none
  model: claude-sonnet-5
  api_key_env: ANTHROPIC_API_KEY
  base_url: null
  timeout_seconds: 30
  max_retries: 2

confidence_defaults:
  regex: 90
  entropy: 55
  ruleset: 85
  llm_judge: 0
  static_heuristic: 60

